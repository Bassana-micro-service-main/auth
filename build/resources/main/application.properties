spring.application.name=service

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Service user_profile (autre base) — URL réelle en dev/prod
auth.user-profile.base-url=
auth.user-profile.create-user-path=/api/internal/users
auth.user-profile.get-user-path=/api/internal/users/{userId}

# Durées des jetons émis au login / register
auth.tokens.access-token-minutes=15
auth.tokens.refresh-token-days=30
